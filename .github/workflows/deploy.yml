name: Deploy SehaTku to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/SehaTku
            git pull origin main
            docker build -t sehatku-app .
            docker stop sehatku-container || true
            docker rm sehatku-container || true
            docker run -d --name sehatku-container -p 80:80 --env-file .env sehatku-app